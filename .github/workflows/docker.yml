# GitHub actions workflow which builds and publishes the docker images.
name: Build docker images

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # trigger manually

# Disable all permissions for the GITHUB_TOKEN access token by default.
permissions: {}

# cancel multiple workflows running on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Space-separated list of image repositories to publish to.
  # To add a new registry:
  # 1. append its repo in REGISTRIES list
  # 2. add a login step
  # 3. add a provenance job
  REPOSITORIES: |
    ghcr.io/${{ github.repository }}
    docker.io/${{ github.repository }}
jobs:
  build:
    name: Build Container Image
    outputs:
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read git details about the repository
      packages: write # Write to ghcr.io
      id-token: write # Needed for signing the images with GitHub OIDC Token
    environment: production
    steps:
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: linux/amd64, linux/arm64

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }} # zizmor: ignore[secrets-outside-env]
          password: ${{ secrets.DOCKER_HUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      # login to ghcr.io
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # add oci labels indicating the packaged software version
      - name: Calculate docker image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REPOSITORIES }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}
          file: "docker/Dockerfile"
          platforms: linux/amd64, linux/arm64
# `docker/build-push-action` v6/v7 enables `provenance=true` by default
# That wraps your image in an OCI image index that also references attestation manifests.
# Docker Hub and other registries (GHCR in that case) do not store/serialize
# the attestation-bearing index identically. As a result  the top-level image digest diverges
          provenance: false
          sbom: false
          outputs: type=image,push=${{ github.event_name != 'pull_request'}},name-canonical=true,oci-mediatypes=true

      # generate SBOM only once per build based on digest
      - name: Generate SBOM for ghcr.io image using Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-container.cdx.json
          upload-artifact: true
          upload-artifact-retention: 1
          upload-release-assets: false

      # attest SBOM once per build based on digest
      - name: Attest SBOM to published image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for repo in $REPOSITORIES; do
            cosign attest --yes \
            --predicate sbom-container.cdx.json \
            --type cyclonedx \
            "${repo}@${DIGEST}"
          done

      # sign the image by digest for every repository
      # cosign sign --yes ${repo}@${DIGEST}
      - name: Sign the images with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for repo in $REPOSITORIES; do
            cosign sign --yes "${repo}@${DIGEST}"
          done

  ghcr-provenance:
    name: ghcr.io Provenance
    needs: [build]
    permissions:
      actions: read # for detecting the Github Actions environment.
      packages: write # write packages provenance
      id-token: write # for creating OIDC tokens for signing.
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.image_digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  dockerhub-provenance:
    name: Docker Hub Provenance
    needs: [build]
    permissions:
      actions: read # for detecting the Github Actions environment.
      packages: write # write packages provenance
      id-token: write # for creating OIDC tokens for signing.
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      image: docker.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.image_digest }}
    secrets:
      registry-username: ${{ secrets.DOCKER_HUB_USERNAME }}
      registry-password: ${{ secrets.DOCKER_HUB_TOKEN }}
