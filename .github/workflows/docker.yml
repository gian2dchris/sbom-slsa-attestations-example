# GitHub actions workflow which builds and publishes the docker images.
name: Build docker images

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # A build was manually requested

# Disable all permissions for the GITHUB_TOKEN access token by default.
permissions: {}

# cancel multiple workflows running on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Container Image
    outputs:
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read git details about the repository
      packages: write # Write to ghcr.io
      id-token: write # Needed for signing the images with GitHub OIDC Token
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # - name: Log in to DockerHub
      #   uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      #   with:
      #     username: ${{ secrets.DOCKER_HUB_USERNAME }} # zizmor: ignore[secrets-outside-env]
      #     password: ${{ secrets.DOCKER_HUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      # login to ghcr.io
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # add oci labels indicating the packaged software version
      - name: Calculate docker image tag
        id: set-tag
        uses: docker/metadata-action@020b7354dd55a28effcab0f3b19639fe24d3f58b # master
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            latest
            type=pep440,pattern={{raw}}

      - name: Build and push all platforms
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          labels: |
            ${{ steps.set-tag.outputs.labels }}
          annotations: |
            ${{ steps.set-tag.outputs.annotations }}
          tags: "${{ steps.set-tag.outputs.tags }}"
          file: "docker/Dockerfile"
          platforms: linux/amd64

      # generate SBOM only once per build based on digest
      - name: Generate SBOM for ghcr.io image using Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

      # attest SBOM once per build based on digest
      - name: Attest SBOM to published image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
        run: |
          cosign attest --yes \
          --predicate sbom.cdx.json \
          --type cyclonedx \
          "${IMAGE}"

      # sign multiple tags to tie them to an image digest
      - name: Sign the images with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.set-tag.outputs.tags }}
        run: |
          images=()
          for tag in ${TAGS}; do
            images+=("${tag}@${DIGEST}")
          done
          cosign sign --yes "${images[@]}"

  ghcr-provenance:
    name: GHCR Hub Provenance
    needs: [build]
    permissions:
      actions: read # for detecting the Github Actions environment.
      packages: write # write packages provenance
      id-token: write # for creating OIDC tokens for signing.
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.image_digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

