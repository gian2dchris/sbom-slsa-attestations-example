# GitHub actions workflow which builds and publishes the docker images.
name: Build docker images

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # trigger manually

# Disable all permissions for the GITHUB_TOKEN access token by default.
permissions: {}

# cancel multiple workflows running on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Space-separated list of image repositories to publish to.
  # To add a new registry:
  # 1. append its repo in REGISTRIES list
  # 2. add a login step
  # 3. add a provenance job
  REPOSITORIES: |
    ghcr.io/${{ github.repository }}
    docker.io/${{ github.repository }}
jobs:
  build:
    name: Build Container Image
    outputs:
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    runs-on: ubuntu-latest

    permissions:
      contents: read # Read git details about the repository
      packages: write # Write to ghcr.io
      id-token: write # Needed for signing the images with GitHub OIDC Token
    environment: production

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }} # zizmor: ignore[secrets-outside-env]
          password: ${{ secrets.DOCKER_HUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      # login to ghcr.io
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      # add oci labels indicating the packaged software version
      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REPOSITORIES }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=pep440,pattern={{raw}}
            type=sha

      - name: Build and push all platforms
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}
          file: "docker/Dockerfile"
          platforms: linux/amd64,linux/arm64
          outputs: type=image,name=ghcr.io/${{ github.repository }},docker.io/${{ github.repository }},push=${{ github.event_name != 'pull_request'}},name-canonical=true,oci-mediatypes=true

      - name: Setup Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      # generate SBOM only once per build based on digest
      - name: Extract digests
        run: |
          set -euo pipefall
          for repo in "${{ env.REPOSITORIES }}"; do
            for arch in linux/amd64 linux/arm64; do
              digest=$(docker buildx imagetools inspect "${repo}@${BUILD_DIGEST}" --format '{{json .}}' \
                      | jq -r --arg arch "$arch" '.manifest.manifests[] | select(.platform.architecture==$arch) | .digest')


          image: ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

      # attest SBOM once per build based on digest
      - name: Attest SBOM to published image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in ${TAGS}; do
            cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${tag}"
          done

      # sign the image by digest in every registry (covers all tags resolving to it)
      # dockerhub stores images using a different digest and returns a 404 for referencing image by digest.
      # Correct implementation should sign and attest ${repo}@${DIGEST} but requires manual steps for dockerhub
      - name: Sign the images with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=()
          for tag in ${TAGS}; do
            images+=("${tag}")
          done
          cosign sign --yes "${images[@]}"

  # merge:
  #   name: Push merged images to ${{ matrix.repository }}
  #   needs: [build]
  #   runs-on: ubuntu-latest
  #   strategy:
  #     matrix:
  #       repository: ${{ env.REGISTRIES }}
  #   permissions:
  #     packages: write
  #     id-token: write
  #   environment: production

  #   steps:
  #     - name: test
  #       id: test
  #       run: |
  #         id

  ghcr-provenance:
    name: ghcr.io Provenance
    needs: [build]
    permissions:
      actions: read # for detecting the Github Actions environment.
      packages: write # write packages provenance
      id-token: write # for creating OIDC tokens for signing.
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.image_digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  dockerhub-provenance:
    name: Docker Hub Provenance
    needs: [build]
    permissions:
      actions: read # for detecting the Github Actions environment.
      packages: write # write packages provenance
      id-token: write # for creating OIDC tokens for signing.
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      image: docker.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.image_digest }}
    secrets:
      registry-username: ${{ secrets.DOCKER_HUB_USERNAME }}
      registry-password: ${{ secrets.DOCKER_HUB_TOKEN }}
